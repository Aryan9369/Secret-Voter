<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Poll - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="font-bold text-xl text-blue-600">Admin Dashboard</h1>
        <a href="index.html" class="text-gray-600 hover:text-blue-600">View All Polls</a>
    </nav>

    <div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6">Create New Poll</h2>
        
        <form id="poll-form" class="space-y-4">
            <!-- Question -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Question</label>
                <input type="text" id="question" required class="w-full p-2 border rounded mt-1" placeholder="e.g. Who should be the next captain?">
            </div>

            <!-- Times -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Start Time</label>
                    <input type="datetime-local" id="start_time" required class="w-full p-2 border rounded mt-1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">End Time</label>
                    <input type="datetime-local" id="end_time" required class="w-full p-2 border rounded mt-1">
                </div>
            </div>

            <!-- Secret Voting Toggle -->
            <div class="flex items-center gap-2">
                <input type="checkbox" id="is_secret" checked class="w-4 h-4 text-blue-600">
                <label for="is_secret" class="text-sm font-medium text-gray-700">Secret Mode (Hide results until manual reveal)</label>
            </div>

            <hr class="my-6">

            <!-- Options Section -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Options</label>
                <div id="options-container" class="space-y-2">
                    <!-- Default 2 options -->
                    <input type="text" class="poll-option w-full p-2 border rounded" placeholder="Option 1" required>
                    <input type="text" class="poll-option w-full p-2 border rounded" placeholder="Option 2" required>
                </div>
                <button type="button" onclick="addOptionField()" class="mt-2 text-blue-600 text-sm font-bold hover:underline">
                    + Add Another Option
                </button>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-6">
                Create Poll
            </button>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        // 1. Check if logged in (Basic security)
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }

        // 2. Add dynamic option field
        function addOptionField() {
            const container = document.getElementById('options-container');
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'poll-option w-full p-2 border rounded mt-2';
            input.placeholder = `Option ${container.children.length + 1}`;
            container.appendChild(input);
        }

        // 3. Handle Form Submission
        document.getElementById('poll-form').onsubmit = async (e) => {
            e.preventDefault();

            // Gather options from all inputs with class 'poll-option'
            const optionElements = document.querySelectorAll('.poll-option');
            const options = Array.from(optionElements)
                                .map(el => ({ option_text: el.value }))
                                .filter(opt => opt.option_text.trim() !== "");

            // Gather other data
            const pollData = {
                question: document.getElementById('question').value,
                start_time: new Date(document.getElementById('start_time').value).toISOString(),
                end_time: new Date(document.getElementById('end_time').value).toISOString(),
                is_secret: document.getElementById('is_secret').checked,
                options: options
            };

            try {
                const res = await apiFetch('voting/polls/create/', {
                    method: 'POST',
                    body: JSON.stringify(pollData)
                });

                if (res.ok) {
                    alert('Poll created successfully!');
                    window.location.href = 'index.html';
                } else {
                    const errorData = await res.json();
                    alert('Error: ' + JSON.stringify(errorData));
                }
            } catch (err) {
                alert('Something went wrong. Ensure you are an Admin.');
            }
        };
    </script>
</body>
</html>
