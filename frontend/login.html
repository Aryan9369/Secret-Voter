<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Secret Voter 🇮🇳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.8));
        }
    </style>
</head>
<body class="bg-white min-h-screen">

    <div class="flex flex-col md:flex-row min-h-screen">
        
        <!-- LEFT SIDE: HERO IMAGE (Hidden on small mobile) -->
        <div class="relative hidden md:flex md:w-1/2 lg:w-2/3 bg-slate-900 overflow-hidden">
            <img src="hero.jpg" alt="Freedom Fighters" class="absolute inset-0 w-full h-full object-cover opacity-80">
            <div class="absolute inset-0 hero-gradient"></div>
            
            <div class="relative z-10 mt-auto p-12 text-white">
                <h1 class="text-4xl lg:text-6xl font-extrabold mb-4 leading-tight">
                    Your Vote is Your <br><span class="text-orange-500">Voice.</span> Your Power.
                </h1>
                <p class="text-lg text-slate-200 max-w-lg">
                    They fought for our freedom. Now, it's our turn to choose our future with honesty and secrecy. 🇮🇳
                </p>
            </div>
            <!-- Logo overlay -->
            <div class="absolute top-8 left-8 z-10 flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <span class="text-white font-bold text-xl tracking-tight">Secret Voter 🇮🇳</span>
            </div>
        </div>

        <!-- RIGHT SIDE: LOGIN FORM -->
        <div class="flex-1 flex items-center justify-center p-8 lg:p-16 bg-slate-50">
            <div class="w-full max-w-[400px]">
                
                <div class="mb-10">
                    <h2 class="text-3xl font-extrabold text-slate-900 mb-2">Welcome Back 📱</h2>
                    <p class="text-slate-500">Sign in with your phone to start voting.</p>
                </div>

                <div class="bg-white p-8 rounded-[32px] shadow-2xl shadow-slate-200 border border-slate-100">
                    
                    <!-- STEP 1: PHONE -->
                    <div id="step1" class="space-y-6" style="display: block;">
                        <div>
                            <label for="phone" class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">🇮🇳</span>
                                <input type="text" id="phone" name="phone" autocomplete="tel" value="+91" 
                                    class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-600 focus:bg-white outline-none transition-all font-semibold text-slate-800">
                            </div>
                        </div>
                        <button type="button" id="btn-send" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg shadow-blue-200">
                            Send OTP Code
                        </button>
                    </div>

                    <!-- STEP 2: OTP -->
                    <div id="step2" class="space-y-6" style="display: none;">
                        <div class="flex items-center gap-3 p-4 bg-green-50 rounded-2xl border border-green-100">
                            <span class="text-xl">🔐</span>
                            <p class="text-xs text-green-700 font-bold uppercase tracking-wider">OTP Sent to your phone</p>
                        </div>
                        <div>
                            <label for="otp" class="block text-sm font-bold text-slate-700 mb-2">Verification Code</label>
                            <input type="text" id="otp" name="otp" placeholder="••••••" maxlength="6"
                                class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-3xl tracking-[12px] font-black focus:border-green-500 focus:bg-white outline-none transition-all">
                        </div>
                        <button type="button" id="btn-verify" 
                            class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg shadow-green-200">
                            Verify & Enter →
                        </button>
                        <button type="button" onclick="location.reload()" class="w-full text-sm text-slate-400 font-medium hover:text-blue-600 transition">
                            Wait, I used wrong number
                        </button>
                    </div>
                </div>

                <p class="mt-10 text-center text-slate-400 text-xs font-medium uppercase tracking-[2px]">
                    Secured by End-to-End Encryption
                </p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const btnSend = document.getElementById('btn-send');
        const btnVerify = document.getElementById('btn-verify');

        btnSend.addEventListener('click', async (e) => {
            const phoneVal = document.getElementById('phone').value;
            const res = await apiFetch('accounts/send-otp/', {
                method: 'POST',
                body: JSON.stringify({ phone_number: phoneVal })
            });

            if (res && res.ok) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
            } else {
                alert("Please enter a valid +91 number");
            }
        });

        btnVerify.addEventListener('click', async (e) => {
            const phoneVal = document.getElementById('phone').value;
            const otpVal = document.getElementById('otp').value;

            const res = await apiFetch('accounts/verify-otp/', {
                method: 'POST',
                body: JSON.stringify({ phone_number: phoneVal, otp: otpVal })
            });

            if (res && res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('is_staff', data.is_staff);
                window.location.replace('index.html');
            } else {
                alert("Invalid OTP");
            }
        });
    </script>
</body>
</html>
